# ── EJa Chess — Kafka development stack ───────────────────────────────────────
#
# Single-node Zookeeper + Kafka for local development.
# Based on the approach from the Software Architecture lecture (Prof. Dr. Boger).
#
# Start:
#   docker-compose -f docker-compose-kafka.yml up -d
#
# Stop + remove volumes:
#   docker-compose -f docker-compose-kafka.yml down -v
#
# Kafka runs on:
#   localhost:9092  (for services running on the host)
#   kafka:9092      (for services running inside Docker)
#
# Topics are created automatically on first use (auto.create.topics.enable=true).
# Relevant topics:
#   chess.move-requests   — chess-api → bot-service  (BotMoveRequestEvent)
#   chess.bot-responses   — bot-service → chess-api  (BotResponseEvent)
# ─────────────────────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
