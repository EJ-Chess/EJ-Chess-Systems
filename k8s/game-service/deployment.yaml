apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game-service
  template:
    metadata:
      labels:
        app: game-service
    spec:
      containers:
      - name: game-service
        image: eja-chess/game-service:latest
        imagePullPolicy: Never  # k3s uses local images only
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: chess-config
        env:
        - name: QUARKUS_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chess-secret
              key: postgres-password
        - name: QUARKUS_OTEL_SDK_DISABLED
          value: "true"
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 65
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          failureThreshold: 15
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
