# Override for PostgreSQL persistence.
# Use together with docker-compose.yml:
#
#   docker-compose -f docker-compose.yml -f docker-compose.db.yml --profile db up --build -d
#
# Sets the JDBC driver and URL at runtime so the game-service connects to
# PostgreSQL instead of the default H2 in-memory database.
# quarkus.datasource.jdbc.driver is a runtime property (unlike db-kind which is build-time).

services:
  game-service:
    environment:
      QUARKUS_DATASOURCE_JDBC_URL:  jdbc:postgresql://postgres:5432/chess
      QUARKUS_DATASOURCE_USERNAME:  chess
      QUARKUS_DATASOURCE_PASSWORD:  chess
    depends_on:
      postgres:
        condition: service_healthy
