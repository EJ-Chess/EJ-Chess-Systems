# Override for PostgreSQL persistence.
# Use together with docker-compose.yml:
#
#   docker-compose -f docker-compose.yml -f docker-compose.db.yml --profile db up --build -d
#
# The game-service is now built with db-kind=postgresql by default.
# These env vars just confirm the database location.

services:
  game-service:
    environment:
      QUARKUS_DATASOURCE_JDBC_URL:     jdbc:postgresql://postgres:5432/chess
      QUARKUS_DATASOURCE_USERNAME:     chess
      QUARKUS_DATASOURCE_PASSWORD:     chess
    depends_on:
      postgres:
        condition: service_healthy
