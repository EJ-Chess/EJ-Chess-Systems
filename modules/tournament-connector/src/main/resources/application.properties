quarkus.application.name=tournament-connector
quarkus.http.port=8088
quarkus.http.test-port=8089

quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=EJa Chess — Tournament Connector
quarkus.smallrye-openapi.info-version=1.0.0

# External tournament server (maichess)
# Use VPN for internal IP: 141.37.74.152
connector.tournament.server.url=http://141.37.123.132:8086

# Bot identity
connector.bot.name=EJaChessBot
connector.bot.elo=1400

# Our bot-service (move computation)
connector.bot.service.url=http://localhost:8081

# Optional: join a specific tournament by ID.
# Leave empty to auto-join the first available "created" tournament.
# connector.tournament.id is intentionally absent — Optional[String] means auto-join when missing

# How often (seconds) to retry finding a tournament when none is available
connector.poll.interval.seconds=30

# Set to false in tests to prevent the connector from dialling out
connector.enabled=true
%test.connector.enabled=false
