quarkus.http.port=8082
quarkus.http.test-port=8083
quarkus.application.name=analytics-service

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=EJa Chess \u2014 Analytics Service
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Spark-based chess game analytics REST API

# CORS — allow the WebUI dev server (Vite proxy handles this in production via nginx)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:80
quarkus.http.cors.methods=GET,POST,OPTIONS

# URL of the game-service for fetching real completed game data.
# Override via env var GAME_SERVICE_URL in Docker / production.
game.service.url=http://localhost:8080

# Path to the Lichess PGN export file (mounted as Docker volume in production).
# Override via env var LICHESS_PGN_PATH.
lichess.pgn.path=/data/lichess.pgn
