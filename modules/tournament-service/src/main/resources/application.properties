quarkus.application.name=tournament-service
quarkus.http.port=8086
quarkus.http.test-port=8087
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tournament;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:tournament_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=EJa Chess — Tournament Service
quarkus.smallrye-openapi.info-version=1.0.0

quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%test.quarkus.otel.sdk.disabled=true

quarkus.micrometer.export.prometheus.enabled=true

# JWT Configuration
mp.jwt.verify.publickey.location=classpath:publickey.pem
mp.jwt.verify.issuer=https://nowchess.local
%test.mp.jwt.verify.publickey.algorithm=RSA
%test.smallrye.jwt.sign.key.location=classpath:privatekey.pem
