quarkus.http.port=8081
quarkus.http.test-port=8081
quarkus.application.name=bot-service

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=EJa Chess \u2014 Bot Service
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Stateless REST API f\u00fcr KI-Zugberechnung (ELO-gesteuert)

# Distributed Tracing (OpenTelemetry)
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%test.quarkus.otel.sdk.disabled=true

# Metrics (Prometheus)
quarkus.micrometer.export.prometheus.enabled=true

# Kafka (KafkaBotConsumer)
# Override via env var KAFKA_BOOTSTRAP_SERVERS in Docker / production
# Set KAFKA_ENABLED=false to disable (used in tests / non-Kafka deployments)
kafka.bootstrap.servers=localhost:9092
kafka.enabled=true
