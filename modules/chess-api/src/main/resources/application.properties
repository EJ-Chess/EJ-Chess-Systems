quarkus.http.port=8080
quarkus.http.test-port=8082
quarkus.application.name=game-service

# URL of the bot-service microservice (overridable via env var BOT_SERVICE_URL)
bot-service.url=http://localhost:8081

# MicroProfile REST Client — uses same URL as bot-service.url
# This enables OTEL trace-context propagation (traceparent header) for Jaeger
quarkus.rest-client.bot-service.url=${bot-service.url:http://localhost:8081}

# CORS — allow browser access from any origin (dev / Docker)
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=EJa Chess \u2014 Game Service
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API f\u00fcr die Verwaltung von Schachpartien (Sitzungen, Z\u00fcge, Import/Export)

# Distributed Tracing (OpenTelemetry)
# In Docker: overridden via QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# Disable OTEL in tests to avoid connection noise
%test.quarkus.otel.sdk.disabled=true

# Metrics (Prometheus)
quarkus.micrometer.export.prometheus.enabled=true

# ── Persistence ───────────────────────────────────────────────────────────────
# Build-time database selection (cannot change at runtime)
# Default: H2 (for Szenario B — Docker without persistent DB)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:chess;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Dev profile: H2 in-memory (local dev with quarkusDev)
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:chess;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.datasource.jdbc.driver=org.h2.Driver

# Test profile: separate in-memory DB
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:chess_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.driver=org.h2.Driver

# Szenario C (Docker with PostgreSQL):
# Agroal datasource (Quarkus built-in) uses H2 (build-time). But DatabaseConfig
# (Slick) reads QUARKUS_DATASOURCE_JDBC_URL from env at runtime and uses the correct DB.
# Disable Agroal health check since it's trying to use H2 drivers on a PostgreSQL URL.
quarkus.datasource.health.enabled=false
