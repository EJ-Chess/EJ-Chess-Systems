quarkus.http.port=8080
quarkus.http.test-port=8082
quarkus.application.name=game-service

# URL of the bot-service microservice (overridable via env var BOT_SERVICE_URL)
bot-service.url=http://localhost:8081

# CORS — allow browser access from any origin (dev / Docker)
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=EJa Chess \u2014 Game Service
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API f\u00fcr die Verwaltung von Schachpartien (Sitzungen, Z\u00fcge, Import/Export)

# Distributed Tracing (OpenTelemetry)
# In Docker: overridden via QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# Disable OTEL in tests to avoid connection noise
%test.quarkus.otel.sdk.disabled=true

# Metrics (Prometheus)
quarkus.micrometer.export.prometheus.enabled=true
